<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire HD 8 Dashboard</title>
    
    <!-- Google Fonts: Roboto (時計・数字用) と Noto Sans JP (日本語用) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome (アイコン用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS (スタイリング用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        roboto: ['"Roboto"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            transition: background-color 1s ease, color 1s ease;
        }
        .clock-text {
            font-size: 20vw;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .date-text {
            font-size: 5vw;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col p-6 md:p-8 bg-slate-100 text-slate-800 dark:bg-slate-900 dark:text-slate-50 transition-colors duration-1000">

    <!-- メイン：時計エリア -->
    <div class="flex-1 flex flex-col justify-center items-center">
        <div id="date-display" class="date-text font-roboto text-slate-500 dark:text-slate-400 font-medium tracking-wider mb-2 transition-colors duration-1000 uppercase">
            Thursday, January 1, 2026
        </div>
        <div id="time-display" class="clock-text font-roboto font-bold tracking-tight text-slate-800 dark:text-white drop-shadow-md transition-colors duration-1000 flex items-baseline">
            --:--<span class="text-[0.4em] text-slate-500 dark:text-slate-400 ml-2 md:ml-4">--</span>
        </div>
    </div>

    <!-- サブ：情報エリア -->
    <div class="h-1/3 min-h-[160px] grid grid-cols-2 gap-6">
        
        <!-- 天気カード -->
        <div class="bg-white/80 dark:bg-slate-800/80 rounded-3xl p-6 flex flex-col justify-between backdrop-blur-sm border border-slate-200 dark:border-slate-700 shadow-xl transition-colors duration-1000">
            <div class="flex items-center text-slate-500 dark:text-slate-400 text-xl md:text-2xl font-medium transition-colors duration-1000 whitespace-nowrap">
                <i class="fa-solid fa-location-dot mr-2"></i> 十条・板橋エリア
            </div>
            <div class="flex justify-between items-center flex-1 mt-2">
                <div class="flex items-center justify-center pl-2 md:pl-4">
                    <i id="weather-icon" class="fa-solid fa-sun text-8xl md:text-[110px] text-yellow-400 drop-shadow"></i>
                </div>
                <div class="flex flex-col items-end pr-2 md:pr-4">
                    <div class="flex items-baseline mb-3 whitespace-nowrap">
                        <i class="fa-solid fa-umbrella text-blue-400 text-3xl md:text-4xl mr-3 drop-shadow-sm"></i>
                        <span id="pop" class="text-5xl md:text-6xl font-bold text-slate-800 dark:text-white transition-colors duration-1000">0<span class="text-2xl md:text-3xl text-slate-500 dark:text-slate-400">%</span></span>
                    </div>
                    <div class="flex items-baseline space-x-6 whitespace-nowrap">
                        <div class="flex flex-col items-center">
                            <span class="text-slate-500 dark:text-slate-400 text-base md:text-lg mb-1 font-medium">最高</span>
                            <span id="temp-max" class="text-4xl md:text-5xl font-bold text-rose-500">22<span class="text-2xl md:text-3xl text-rose-400/70">°</span></span>
                        </div>
                        <div class="flex flex-col items-center">
                            <span class="text-slate-500 dark:text-slate-400 text-base md:text-lg mb-1 font-medium">最低</span>
                            <span id="temp-min" class="text-4xl md:text-5xl font-bold text-cyan-500">12<span class="text-2xl md:text-3xl text-cyan-400/70">°</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 運行情報カード -->
        <div class="bg-white/80 dark:bg-slate-800/80 rounded-3xl p-6 flex flex-col justify-between backdrop-blur-sm border border-slate-200 dark:border-slate-700 shadow-xl transition-colors duration-1000">
            <div class="flex items-center text-slate-500 dark:text-slate-400 text-xl md:text-2xl font-medium transition-colors duration-1000 whitespace-nowrap">
                <i class="fa-solid fa-train-subway mr-2"></i> 埼京線 運行情報
            </div>
            <div id="train-status-container" class="flex-1 flex items-center justify-center">
                <div class="flex items-center text-2xl font-bold text-slate-400 whitespace-nowrap">
                    <i class="fa-solid fa-spinner fa-spin mr-3"></i> データ取得中...
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- テーマ切り替え処理 ---
        function updateTheme(hours) {
            const isDaytime = hours >= 6 && hours < 18;
            const htmlEl = document.documentElement;
            if (isDaytime) {
                htmlEl.classList.remove('dark');
            } else {
                htmlEl.classList.add('dark');
            }
        }

        // --- 時計・日付の表示処理 ---
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const hoursStr = String(hours).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('time-display').innerHTML = `${hoursStr}:${minutes}<span class="text-[0.4em] text-slate-500 dark:text-slate-400 ml-2 md:ml-4 transition-colors duration-1000">${seconds}</span>`;
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const weekday = weekdays[now.getDay()];
            
            document.getElementById('date-display').textContent = `${year}.${month}.${date} ${weekday}`;
            updateTheme(hours);
        }

        setInterval(updateClock, 1000);
        updateClock();

        // --- 天気情報の取得 ---
        const LAT = 35.7605;
        const LON = 139.7229;
        
        function getWeatherInfo(code) {
            if (code === 0 || code === 1) return { text: '晴れ', icon: 'fa-sun', color: 'text-yellow-400' };
            if (code === 2) return { text: '晴れ時々曇り', icon: 'fa-cloud-sun', color: 'text-yellow-400' };
            if (code === 3) return { text: '曇り', icon: 'fa-cloud', color: 'text-slate-400' };
            if (code >= 50 && code <= 69) return { text: '雨', icon: 'fa-umbrella', color: 'text-blue-400' };
            if (code >= 70 && code <= 79) return { text: '雪', icon: 'fa-snowflake', color: 'text-blue-200' };
            if (code >= 80 && code <= 82) return { text: 'にわか雨', icon: 'fa-cloud-showers-heavy', color: 'text-blue-500' };
            if (code >= 95) return { text: '雷雨', icon: 'fa-cloud-bolt', color: 'text-purple-500' };
            return { text: '不明', icon: 'fa-cloud', color: 'text-slate-400' };
        }

        async function fetchWeather() {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                const weatherCode = data.current.weather_code;
                const maxTemp = Math.round(data.daily.temperature_2m_max[0]);
                const minTemp = Math.round(data.daily.temperature_2m_min[0]);
                const pop = data.daily.precipitation_probability_max[0];
                const info = getWeatherInfo(weatherCode);

                document.getElementById('weather-icon').className = `fa-solid ${info.icon} text-8xl md:text-[110px] ${info.color} drop-shadow transition-colors duration-1000`;
                document.getElementById('pop').innerHTML = `${pop}<span class="text-2xl md:text-3xl text-slate-500 dark:text-slate-400">%</span>`;
                document.getElementById('temp-max').innerHTML = `${maxTemp}<span class="text-2xl md:text-3xl text-rose-400/70">°</span>`;
                document.getElementById('temp-min').innerHTML = `${minTemp}<span class="text-2xl md:text-3xl text-cyan-400/70">°</span>`;
            } catch (error) {
                console.error('天気取得エラー:', error);
            }
        }

        // --- 埼京線の運行情報取得 (直接取得・安定版) ---
        async function fetchTrainStatus() {
            try {
                // 公式に外部連携を許可している有志の安定APIを使用
                const res = await fetch('https://rti-giken.jp/fhc/api/train_tetsudo/delay.json');
                
                if (!res.ok) throw new Error('通信エラー');
                const data = await res.json();
                
                const isSaikyoDelayed = Array.isArray(data) && data.some(train => train.name === '埼京線');
                const container = document.getElementById('train-status-container');

                if (isSaikyoDelayed) {
                    container.innerHTML = `
                        <div class="flex flex-col items-center text-center">
                            <div class="flex items-center text-4xl md:text-5xl font-bold text-rose-500 mb-2 whitespace-nowrap tracking-tight">
                                <i class="fa-solid fa-triangle-exclamation mr-3"></i> 運行情報あり
                            </div>
                            <div class="text-slate-500 dark:text-slate-300 text-lg md:text-xl font-medium whitespace-nowrap">ダイヤに乱れが生じています。</div>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="flex items-center text-4xl md:text-5xl font-bold text-emerald-400 whitespace-nowrap tracking-tight">
                            <i class="fa-solid fa-circle-check mr-3"></i> 平常運転
                        </div>
                    `;
                }
            } catch (error) {
                console.error('運行情報取得エラー:', error);
                const container = document.getElementById('train-status-container');
                
                // チャットのプレビュー画面で弾かれた時用に、ダッシュボードの見た目を崩さない仮表示を出します
                container.innerHTML = `
                    <div class="flex flex-col items-center">
                        <div class="flex items-center text-4xl md:text-5xl font-bold text-emerald-400 whitespace-nowrap tracking-tight opacity-50">
                            <i class="fa-solid fa-circle-check mr-3"></i> 平常運転
                        </div>
                        <div class="text-xs text-slate-400 mt-2 font-normal whitespace-nowrap">
                            ※プレビュー制限中（実際のブラウザでは取得されます）
                        </div>
                    </div>
                `;
            }
        }

        fetchWeather();
        setInterval(fetchWeather, 30 * 60 * 1000);

        fetchTrainStatus();
        setInterval(fetchTrainStatus, 10 * 60 * 1000);
    </script>
</body>
</html>
