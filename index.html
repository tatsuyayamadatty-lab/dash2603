<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire HD 8 Dashboard</title>
    
    <!-- Google Fonts: Roboto (時計用) & Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        roboto: ['"Roboto"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            transition: background-color 1s ease, color 1s ease;
        }
        .clock-text {
            font-size: 20vw;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .date-text {
            font-size: 5vw;
        }
        /* 文字のガタつき防止 */
        .whitespace-nowrap { white-space: nowrap; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col p-6 md:p-8 bg-slate-100 text-slate-800 dark:bg-slate-900 dark:text-slate-50 transition-colors duration-1000">

    <!-- 時計エリア -->
    <div class="flex-1 flex flex-col justify-center items-center">
        <div id="date-display" class="date-text font-roboto text-slate-500 dark:text-slate-400 font-medium tracking-wider mb-2 transition-colors duration-1000 uppercase">
            ----.--.-- ---
        </div>
        <div id="time-display" class="clock-text font-roboto font-bold tracking-tight text-slate-800 dark:text-white drop-shadow-md transition-colors duration-1000 flex items-baseline">
            --:--<span class="text-[0.4em] text-slate-500 dark:text-slate-400 ml-2 md:ml-4">--</span>
        </div>
    </div>

    <!-- 情報エリア -->
    <div class="h-1/3 min-h-[160px] grid grid-cols-2 gap-6">
        
        <!-- 天気 -->
        <div class="bg-white/80 dark:bg-slate-800/80 rounded-3xl p-6 flex flex-col justify-between backdrop-blur-sm border border-slate-200 dark:border-slate-700 shadow-xl transition-colors duration-1000">
            <div class="flex items-center text-slate-500 dark:text-slate-400 text-xl md:text-2xl font-medium transition-colors duration-1000 whitespace-nowrap">
                <i class="fa-solid fa-location-dot mr-2"></i> 十条・板橋エリア
            </div>
            <div class="flex justify-between items-center flex-1 mt-2">
                <div class="flex items-center justify-center pl-2 md:pl-4">
                    <i id="weather-icon" class="fa-solid fa-circle-nodes text-7xl md:text-8xl text-slate-300 animate-pulse"></i>
                </div>
                <div class="flex flex-col items-end pr-2 md:pr-4">
                    <div class="flex items-baseline mb-3 whitespace-nowrap">
                        <i class="fa-solid fa-umbrella text-blue-400 text-3xl md:text-4xl mr-3"></i>
                        <span id="pop" class="text-5xl md:text-6xl font-bold text-slate-800 dark:text-white">--<span class="text-2xl md:text-3xl text-slate-500 dark:text-slate-400">%</span></span>
                    </div>
                    <div class="flex items-baseline space-x-6 whitespace-nowrap">
                        <div class="flex flex-col items-center">
                            <span class="text-slate-500 dark:text-slate-400 text-base md:text-lg mb-1 font-medium">最高</span>
                            <span id="temp-max" class="text-4xl md:text-5xl font-bold text-rose-500">--<span class="text-2xl md:text-3xl text-rose-400/70">°</span></span>
                        </div>
                        <div class="flex flex-col items-center">
                            <span class="text-slate-500 dark:text-slate-400 text-base md:text-lg mb-1 font-medium">最低</span>
                            <span id="temp-min" class="text-4xl md:text-5xl font-bold text-cyan-500">--<span class="text-2xl md:text-3xl text-cyan-400/70">°</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 電車 -->
        <div class="bg-white/80 dark:bg-slate-800/80 rounded-3xl p-6 flex flex-col justify-between backdrop-blur-sm border border-slate-200 dark:border-slate-700 shadow-xl transition-colors duration-1000">
            <div class="flex items-center text-slate-500 dark:text-slate-400 text-xl md:text-2xl font-medium whitespace-nowrap">
                <i class="fa-solid fa-train-subway mr-2"></i> 埼京線 運行情報
            </div>
            <div id="train-status-container" class="flex-1 flex items-center justify-center">
                <div class="flex items-center text-2xl font-bold text-slate-400 whitespace-nowrap">
                    <i class="fa-solid fa-spinner fa-spin mr-3"></i> 取得中
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- テーマ切り替え ---
        function updateTheme(hours) {
            const isDaytime = hours >= 6 && hours < 18;
            document.documentElement.classList.toggle('dark', !isDaytime);
        }

        // --- 時計・日付 ---
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const hoursStr = String(hours).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('time-display').innerHTML = `${hoursStr}:${minutes}<span class="text-[0.4em] text-slate-500 dark:text-slate-400 ml-2 md:ml-4 transition-colors duration-1000">${seconds}</span>`;
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            document.getElementById('date-display').textContent = `${year}.${month}.${date} ${weekdays[now.getDay()]}`;
            
            updateTheme(hours);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 天気 ---
        async function fetchWeather() {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=35.7605&longitude=139.7229&current=weather_code&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const code = data.current.weather_code;
                
                let icon = 'fa-sun', color = 'text-yellow-400';
                if (code >= 2 && code <= 3) { icon = 'fa-cloud-sun'; color = 'text-slate-400'; }
                else if (code >= 50) { icon = 'fa-umbrella'; color = 'text-blue-400'; }

                document.getElementById('weather-icon').className = `fa-solid ${icon} text-8xl md:text-[110px] ${color} drop-shadow transition-colors duration-1000`;
                document.getElementById('pop').innerHTML = `${data.daily.precipitation_probability_max[0]}<span class="text-2xl md:text-3xl text-slate-500 dark:text-slate-400">%</span>`;
                document.getElementById('temp-max').innerHTML = `${Math.round(data.daily.temperature_2m_max[0])}<span class="text-2xl md:text-3xl text-rose-400/70">°</span>`;
                document.getElementById('temp-min').innerHTML = `${Math.round(data.daily.temperature_2m_min[0])}<span class="text-2xl md:text-3xl text-cyan-400/70">°</span>`;
            } catch (e) { console.error(e); }
        }

        // --- 電車 (CORS回避のための複数プロキシ試行) ---
        async function fetchTrainStatus() {
            const target = 'https://rti-giken.jp/fhc/api/train_tetsudo/delay.json';
            const proxies = [
                `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`,
                `https://corsproxy.io/?${encodeURIComponent(target)}`
            ];

            let data = null;
            for (const p of proxies) {
                try {
                    const res = await fetch(p);
                    const json = await res.json();
                    const content = p.includes('allorigins') ? JSON.parse(json.contents) : json;
                    if (Array.isArray(content)) { data = content; break; }
                } catch (e) { continue; }
            }

            const container = document.getElementById('train-status-container');
            if (!data) {
                container.innerHTML = '<div class="text-slate-400 text-xl font-bold">情報取得待機中...</div>';
                return;
            }

            const isDelay = data.some(t => t.name === '埼京線');
            container.innerHTML = isDelay ? 
                `<div class="flex flex-col items-center text-center"><div class="text-4xl md:text-5xl font-bold text-rose-500 whitespace-nowrap tracking-tight"><i class="fa-solid fa-triangle-exclamation mr-3"></i>運行情報あり</div><div class="text-slate-500 dark:text-slate-300 text-lg md:text-xl font-medium mt-1">ダイヤに乱れがあります</div></div>` :
                `<div class="text-4xl md:text-5xl font-bold text-emerald-400 whitespace-nowrap tracking-tight"><i class="fa-solid fa-circle-check mr-3"></i>平常運転</div>`;
        }

        fetchWeather(); setInterval(fetchWeather, 1800000);
        fetchTrainStatus(); setInterval(fetchTrainStatus, 600000);
    </script>
</body>
</html>
