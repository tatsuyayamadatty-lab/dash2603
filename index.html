<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire HD 8 Dashboard</title>
    
    <!-- Google Fonts: Roboto (時計・数字用) & Noto Sans JP (日本語用) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome (アイコン用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        roboto: ['"Roboto"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            transition: background-color 1s ease, color 1s ease;
        }
        .clock-text {
            font-size: 16vw; 
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .date-text {
            font-size: 4vw;
        }
        .whitespace-nowrap { white-space: nowrap; }
        
        .dashboard-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2vh 4vw 8vh 4vw; 
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 dark:bg-slate-900 dark:text-slate-50 transition-colors duration-1000 relative text-center md:text-left">

    <!-- 全画面表示ボタン -->
    <button id="fullscreen-btn" class="absolute top-2 right-4 z-50 w-10 h-10 flex items-center justify-center rounded-full bg-white/20 dark:bg-slate-800/20 backdrop-blur-md border border-slate-300 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:scale-110 transition-all active:scale-95 shadow-sm">
        <i id="fullscreen-icon" class="fa-solid fa-expand text-lg"></i>
    </button>

    <div class="dashboard-container">
        <!-- 時計エリア -->
        <div class="flex-grow flex flex-col justify-center items-center">
            <div id="date-display" class="date-text font-roboto text-slate-500 dark:text-slate-400 font-medium tracking-[0.2em] mb-1 transition-colors duration-1000 uppercase text-center">
                ----.--.-- ---
            </div>
            <div id="time-display" class="clock-text font-roboto font-bold tracking-[0.12em] text-slate-800 dark:text-white drop-shadow-md transition-colors duration-1000 flex items-baseline justify-center">
                --:--<span class="text-[0.4em] text-slate-500 dark:text-slate-400 ml-2 tracking-normal">--</span>
            </div>
        </div>

        <!-- 情報エリア -->
        <div class="h-[32vh] grid grid-cols-2 gap-4">
            
            <!-- 天気カード -->
            <div class="bg-white/80 dark:bg-slate-800/80 rounded-3xl p-5 flex flex-col justify-between backdrop-blur-sm border border-slate-200 dark:border-slate-700 shadow-xl transition-colors duration-1000">
                <div class="flex items-center text-slate-500 dark:text-slate-400 text-lg md:text-xl font-medium whitespace-nowrap">
                    <i class="fa-solid fa-location-dot mr-2"></i> 十条・板橋エリア
                </div>
                <div class="flex justify-between items-center flex-1">
                    <div class="flex items-center justify-center pl-2">
                        <i id="weather-icon" class="fa-solid fa-circle-nodes text-6xl md:text-7xl text-slate-300 animate-pulse"></i>
                    </div>
                    <div class="flex flex-col items-end pr-2 text-right">
                        <div class="flex items-baseline mb-2 whitespace-nowrap">
                            <i class="fa-solid fa-umbrella text-blue-400 text-2xl md:text-3xl mr-2"></i>
                            <span id="pop" class="text-4xl md:text-5xl font-bold text-slate-800 dark:text-white">--<span class="text-xl md:text-2xl text-slate-500 dark:text-slate-400">%</span></span>
                        </div>
                        <div class="flex items-baseline space-x-4 whitespace-nowrap">
                            <div class="flex flex-col items-center">
                                <span class="text-slate-500 dark:text-slate-400 text-xs md:text-sm font-medium">最高</span>
                                <span id="temp-max" class="text-3xl md:text-4xl font-bold text-rose-500">--<span class="text-xl md:text-2xl text-rose-400/70">°</span></span>
                            </div>
                            <div class="flex flex-col items-center">
                                <span class="text-slate-500 dark:text-slate-400 text-xs md:text-sm font-medium">最低</span>
                                <span id="temp-min" class="text-3xl md:text-4xl font-bold text-cyan-500">--<span class="text-xl md:text-2xl text-cyan-400/70">°</span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 運行情報カード -->
            <div id="train-card" class="bg-white/80 dark:bg-slate-800/80 rounded-3xl p-5 flex flex-col justify-between backdrop-blur-sm border border-slate-200 dark:border-slate-700 shadow-xl transition-colors duration-1000 relative overflow-hidden">
                <div class="flex items-center text-slate-500 dark:text-slate-400 text-lg md:text-xl font-medium whitespace-nowrap justify-between">
                    <span><i class="fa-solid fa-train-subway mr-2"></i> 埼京線 運行情報</span>
                    <span id="train-update-time" class="text-[10px] opacity-40 font-roboto">--:--</span>
                </div>
                <div id="train-status-container" class="flex-1 flex items-center justify-center text-center">
                    <div class="flex flex-col items-center text-slate-400 whitespace-nowrap">
                        <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
                        <span class="text-sm font-bold tracking-widest uppercase text-emerald-500/50">Checking</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 全画面表示の切り替えロジック ---
        const fsBtn = document.getElementById('fullscreen-btn');
        const fsIcon = document.getElementById('fullscreen-icon');

        fsBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Fullscreen Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            const isFS = !!document.fullscreenElement;
            fsIcon.classList.toggle('fa-expand', !isFS);
            fsIcon.classList.toggle('fa-compress', isFS);
            fsBtn.classList.toggle('opacity-10', isFS);
        });

        // --- テーマ切り替え ---
        function updateTheme(hours) {
            const isDaytime = hours >= 6 && hours < 18;
            document.documentElement.classList.toggle('dark', !isDaytime);
        }

        // --- 時計・日付表示 ---
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time-display').innerHTML = `${h}:${m}<span class="text-[0.4em] text-slate-500 dark:text-slate-400 ml-2 tracking-normal">${s}</span>`;
            
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${days[now.getDay()]}`;
            document.getElementById('date-display').textContent = dateStr;
            updateTheme(now.getHours());
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 天気情報の取得 ---
        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=35.7605&longitude=139.7229&current=weather_code&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo`);
                const d = await res.json();
                let icon = 'fa-sun', color = 'text-yellow-400';
                const code = d.current.weather_code;
                if (code >= 2 && code <= 3) { icon = 'fa-cloud-sun'; color = 'text-slate-400'; }
                else if (code >= 50) { icon = 'fa-umbrella'; color = 'text-blue-400'; }

                document.getElementById('weather-icon').className = `fa-solid ${icon} text-7xl md:text-8xl ${color} drop-shadow transition-colors duration-1000`;
                document.getElementById('pop').innerHTML = `${d.daily.precipitation_probability_max[0]}<span class="text-xl md:text-2xl text-slate-500 dark:text-slate-400">%</span>`;
                document.getElementById('temp-max').innerHTML = `${Math.round(d.daily.temperature_2m_max[0])}<span class="text-xl md:text-2xl text-rose-400/70">°</span>`;
                document.getElementById('temp-min').innerHTML = `${Math.round(d.daily.temperature_2m_min[0])}<span class="text-xl md:text-2xl text-cyan-400/70">°</span>`;
            } catch (e) { console.error(e); }
        }

        // --- 運行情報の取得 (埼京線のみを厳格に抽出) ---
        async function fetchTrainStatus() {
            const container = document.getElementById('train-status-container');
            const updateTimeEl = document.getElementById('train-update-time');
            
            const sources = [
                { type: 'json', url: 'https://rti-giken.jp/fhc/api/train_tetsudo/delay.json' },
                { type: 'html', url: 'https://transit.yahoo.co.jp/diainfo/46/0' }
            ];

            const proxies = [
                'https://api.allorigins.win/get?url=',
                'https://api.codetabs.com/v1/proxy?quest=',
                'https://corsproxy.io/?'
            ];

            let foundSaikyoDelay = false;
            let success = false;

            for (const source of sources) {
                if (success) break;

                for (const proxy of proxies) {
                    try {
                        const finalUrl = proxy + encodeURIComponent(source.url);
                        const res = await fetch(finalUrl);
                        if (!res.ok) continue;

                        if (source.type === 'json') {
                            const data = await res.json();
                            const content = data.contents ? JSON.parse(data.contents) : data;
                            if (Array.isArray(content)) {
                                // 「埼京線」という名前に完全一致するものだけを探す
                                foundSaikyoDelay = content.some(line => line.name === '埼京線');
                                success = true;
                                break;
                            }
                        } else {
                            const html = await res.text();
                            const content = html.includes('"contents"') ? JSON.parse(html).contents : html;
                            
                            if (content.length > 500) {
                                // ページ上部のメインステータス部分のみを抽出（関連路線を排除）
                                const saikyoSectionMatch = content.match(/<dd class="trouble">([\s\S]*?)<\/dd>/) || 
                                                           content.match(/<div id="mdServiceStatus">([\s\S]*?)<\/div>/);
                                
                                if (saikyoSectionMatch) {
                                    const statusText = saikyoSectionMatch[1];
                                    // メインのステータス表示エリアに「平常」の文字がない場合は遅延とみなす
                                    foundSaikyoDelay = !statusText.includes('平常どおり');
                                    success = true;
                                    break;
                                }
                            }
                        }
                    } catch (e) { continue; }
                }
            }

            if (success) {
                const now = new Date();
                updateTimeEl.textContent = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
                
                if (foundSaikyoDelay) {
                    container.innerHTML = `
                        <div class="flex flex-col items-center">
                            <div class="text-3xl md:text-4xl font-bold text-rose-500 tracking-tight whitespace-nowrap">
                                <i class="fa-solid fa-triangle-exclamation mr-2"></i>運行情報あり
                            </div>
                            <div class="text-slate-500 dark:text-slate-300 text-xs md:text-sm font-medium mt-1">ダイヤに乱れが生じています</div>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="text-3xl md:text-4xl font-bold text-emerald-400 tracking-tight whitespace-nowrap">
                            <i class="fa-solid fa-circle-check mr-2"></i>平常運転
                        </div>
                    `;
                }
            } else {
                container.innerHTML = `
                    <button onclick="fetchTrainStatus()" class="flex flex-col items-center text-slate-400 active:text-slate-200">
                        <i class="fa-solid fa-rotate-right text-xl mb-1"></i>
                        <span class="text-[10px] font-bold uppercase tracking-widest">Connect Error</span>
                    </button>
                `;
            }
        }

        fetchWeather(); 
        setInterval(fetchWeather, 1800000); 

        fetchTrainStatus(); 
        setInterval(fetchTrainStatus, 300000);
    </script>
</body>
</html>
